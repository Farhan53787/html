<!DOCTYPE html>

<html>

<head>
  <style>
    #para {
      color:aquamarine;
      background-color:white;
    }
    .demo {
      color:brown;
      background-color:greenyellow
    }
    .p1{
      font-weight:200;
    }
    .p2{
      font-weight:400;
    }
    .p3{
      font-weight:600;
    }
    .p4{
      font-weight:bold;
    }
    .t1{
      text-decoration: overline;
    }
    .t2{
      text-decoration: underline;
    }
    .t3{
      text-decoration: line-through;
    }
    .t4{
      text-decoration: none;
    }
    .k1{
      text-transform:lowercase
    }
    .k2{
      text-transform:uppercase
    }
    .k3{
      text-transform:capitalize
    }
    .k4{
      text-transform:none
    }
  </style>
</head>

<body>
  <h1 class="demo">
    Welcome to Class Selector
  </h1>
  <p id="para">New in CSS Programming?</p>
  <p class="demo">
    Let's learn CSS together!
    </p>
  <p class="p1">
    Communist
  </p> 
  <p class="p2">
    Socialist
  </p> 
  <p class="p3">
    Republic
  </p>
  <p class="p4">
    of Russia
  </p>
  <h1 class="t1">heading1</h1>
  <h2 class="t2">heading2</h2>
  <h3 class="t3">heading3</h3>
  <h4 class="t4">heading4</h4>
  <p class="k1">lowercase</p>
  <p class="k2">uppercase</p>
  <p class="k3">capitalize</p>
  <p class="k4">none</p>
</body>

</html>
