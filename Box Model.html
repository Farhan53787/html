<head>
    <title>CSS Box Model Example</title>
    <style type ="text/css">
        .example1 {
            width: 220px;
            background-color: lightblue;
            border: 0px;
            padding: 0px;
            margin: 0px; }

        .example2 {
            width: 220px;
            background-color: rgb(0, 255, 21);
            border: 5px solid white;
            padding: 50px;
            margin: 40px 20px; }
        hr {
            background-color=blue;
        }
    </style>
</head>
<body>
    <h1>Box Model Example</h1>
    <hr>
    <p class="example1">My Model example 1</p>
    <hr style="width: 10%; height: 10px; color: blue;">
    <p class="example2">My Model example 2</p>
    <hr style="width: 20%; height: 1px; color: blue;">
</body>
